<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifique seu limite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
            <div class="box">
                <div class="content">
                    <h2>VERIQUE SEU LIMITE 👌</h2>
                    <input class="input" type="text" placeholder="Digite seu nome" name="" id="">
                    <input class="input" type="number" placeholder="Numeros do cartão" name="" id="">
                    <input class="input" type="month" name="" id="">
                    <div class="campo-senha">
                        <input class="input" id="senha" type="password" placeholder="3 digitos">
                        <button type="button" class="ocultar-senha" onclick="toggleSenha()">👁️</button>
                    </div>
                    <button id="acabou" class="input botao" onclick="playAudio()" type="submit">ANALISAR</button>
                </div>
            </div>
    </main>
</body>
<script src="script.js"></script>
</html>
